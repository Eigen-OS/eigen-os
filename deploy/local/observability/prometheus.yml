global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/stage-slo-alerts.yaml
  - /etc/prometheus/rules/orchestrator-alerts.yaml
  - /etc/prometheus/rules/benchmark-alerts.yaml
  - /etc/prometheus/rules/intelligent-runtime-alerts.yaml
  - /etc/prometheus/rules/cluster-runtime-alerts.yaml
  - /etc/prometheus/rules/runtime-data-alerts.yaml
  - /etc/prometheus/rules/adaptive-loop-alerts.yaml

scrape_configs:
  - job_name: system-api
    metrics_path: /metrics
    static_configs:
      - targets: ["system-api:9090"]

  - job_name: eigen-kernel
    metrics_path: /metrics
    static_configs:
      - targets: ["eigen-kernel:50052"]

  - job_name: eigen-compiler
    metrics_path: /metrics
    static_configs:
      - targets: ["eigen-compiler:9093"]

  - job_name: driver-manager
    metrics_path: /metrics
    static_configs:
      - targets: ["driver-manager:9092"]

  - job_name: neuro-symbolic-service
    metrics_path: /metrics
    static_configs:
      - targets: ["neuro-symbolic-service:50082"]

  - job_name: observability-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["observability-metrics:9100"]
      