syntax = "proto3";

package eigen.internal.v1;

import "eigen/internal/v1/types.proto";

option go_package = "github.com/eigen-os/eigen/api/internal/v1;internalv1";
option java_multiple_files = true;
option java_outer_classname = "OptimizerServiceProto";
option java_package = "com.eigen.api.internal.v1";

// Internal optimizer service contract v1.
// Source of truth: RFC 0056.
service OptimizerService {
  rpc OptimizeCircuit(OptimizerServiceOptimizeCircuitRequest) returns (OptimizerServiceOptimizeCircuitResponse);
}

message OptimizerContractEnvelope {
  // Stable payload SemVer.
  string contract_version = 1;
}

message OptimizationObjective {
  // Preset objective id (e.g. "latency", "fidelity", "balanced").
  string preset = 1;
  // Optional weighted objectives (weights are deterministic default 0 when absent).
  map<string, double> weights = 2;
}

message TopologyContext {
  string topology_ref = 1;
  string topology_digest_sha256 = 2;
  string noise_snapshot_ref = 3;
  string backend_profile = 4;
}

message GraphEncodingContext {
  // Versioned canonical graph encoding shape.
  string encoding_version = 1;
  // Canonical serialization format name.
  string canonical_format = 2;
  // Canonicalized graph payload encoded as deterministic JSON.
  string canonical_graph_json = 3;
  // SHA-256 of the canonical graph payload.
  string canonical_sha256 = 4;
  // True when the canonical payload round-trips without loss.
  bool round_trip_stability = 5;
}

message OptimizerPolicy {
  // Policy mode freeze for deterministic ranking semantics.
  string mode = 1;
  // Minimum acceptable confidence for non-fallback results.
  double minimum_confidence = 2;
  // Maximum optimization depth permitted by policy.
  uint32 max_depth = 3;
  // Maximum number of swaps permitted by policy.
  uint32 max_swaps = 4;
  repeated string forbidden_qubits = 5;
  repeated string forbidden_edges = 6;
}

message OptimizerRankingSemantics {
  // Deterministic ranking order used for stable replay.
  repeated string sort_order = 1;
  // True when the selected candidate must be the first entry in the ordered list.
  bool selected_candidate_is_first = 2;
  // Stable tie-breakers applied after score ordering.
  repeated string tie_breakers = 3;
}

message OptimizerServiceOptimizeCircuitRequest {
  OptimizerContractEnvelope envelope = 1;
  string request_id = 2;
  CircuitPayload input_aqo = 3;
  TopologyContext topology = 4;
  OptimizationObjective objective = 5;
  uint64 deterministic_seed = 6;
  uint32 candidate_budget = 7;
  uint32 timeout_ms = 8;
  map<string, string> trace_context = 9;
  GraphEncodingContext graph_encoding = 10;
  OptimizerPolicy policy = 11;
  OptimizerRankingSemantics ranking_semantics = 12;
}

message ScoreBreakdown {
  double total_score = 1;
  double latency_score = 2;
  double fidelity_score = 3;
  double resource_score = 4;
  double risk_score = 5;
}

message OptimizedCandidate {
  string candidate_id = 1;
  CircuitPayload mapped_aqo = 2;
  ScoreBreakdown score = 3;
  double confidence = 4;
  string explainability_summary = 5;
  map<string, string> metadata = 6;
}

enum OptimizerReasonCode {
  OPTIMIZER_REASON_CODE_UNSPECIFIED = 0;
  OPTIMIZER_REASON_CODE_INVALID_AQO = 1;
  OPTIMIZER_REASON_CODE_TOPOLOGY_MISSING = 2;
  OPTIMIZER_REASON_CODE_MODEL_UNAVAILABLE = 3;
  OPTIMIZER_REASON_CODE_TIMEOUT = 4;
  OPTIMIZER_REASON_CODE_INTERNAL = 5;
  OPTIMIZER_REASON_CODE_FEATURE_EXTRACTION_FAILED = 6;
  OPTIMIZER_REASON_CODE_CONFIDENCE_TOO_LOW = 7;
  OPTIMIZER_REASON_CODE_UNSUPPORTED_BACKEND = 8;
  OPTIMIZER_REASON_CODE_POLICY_REJECTED = 9;
}

message OptimizerError {
  OptimizerReasonCode reason_code = 1;
  string message = 2;
  string retry_semantics = 3;
  string details_ref = 4;
}

message OptimizerServiceOptimizeCircuitResponse {
  string request_id = 1;
  repeated OptimizedCandidate candidates = 2;
  string selected_candidate_id = 3;
  string model_version = 4;
  bool fallback_used = 5;
  string fallback_reason = 6;
  uint64 deterministic_seed = 7;
  string trace_id = 8;
  uint32 optimizer_latency_ms = 9;
  uint32 scoring_latency_ms = 10;
  uint32 mapping_latency_ms = 11;
  OptimizerError error = 12;
  string fallback_reason_code = 13;
  double confidence_score = 14;
  string explanation_ref = 15;
  string optimizer_digest = 16;

  // Classification label for the model output.
  // Allowed values: Advisory, Optimization, Recommendation, Informational.
  // Unknown or empty values MUST be rejected by the caller/service boundary.
  string classification_label = 17;
}
