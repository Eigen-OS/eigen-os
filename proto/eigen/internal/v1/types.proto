syntax = "proto3";

package eigen.internal.v1;

option go_package = "github.com/eigen-os/eigen/api/internal/v1;internalv1";
option java_multiple_files = true;
option java_outer_classname = "InternalTypesProto";
option java_package = "com.eigen.api.internal.v1";

// Common internal types for Eigen OS services (MVP).

enum CircuitFormat {
  CIRCUIT_FORMAT_UNSPECIFIED = 0;

  // Canonical intermediate representation.
  CIRCUIT_FORMAT_AQO_JSON = 1;
  CIRCUIT_FORMAT_AQO_PROTO = 2;

  // OpenQASM 3 text.
  CIRCUIT_FORMAT_QASM3_TEXT = 3;

  // Vendor-specific native payload.
  CIRCUIT_FORMAT_BACKEND_NATIVE = 4;
}

message CircuitPayload {
  CircuitFormat format = 1;
  bytes data = 2;
}

enum DeviceStatus {
  DEVICE_STATUS_UNSPECIFIED = 0;
  DEVICE_STATUS_ONLINE = 1;
  DEVICE_STATUS_OFFLINE = 2;
  DEVICE_STATUS_CALIBRATING = 3;
  DEVICE_STATUS_MAINTENANCE = 4;
  DEVICE_STATUS_ERROR_STATUS = 5;
}

message DeviceInfo {
  string device_id = 1;
  string name = 2;
  string backend_type = 3;
  DeviceStatus status = 4;
  int32 queue_depth = 5;
  int32 estimated_wait_sec = 6;
  map<string, string> capabilities = 7;
}