syntax = "proto3";

package eigen.internal.v1;

import "eigen/internal/v1/types.proto";

option go_package = "github.com/eigen-os/eigen/api/internal/v1;internalv1";
option java_multiple_files = true;
option java_outer_classname = "CompilationServiceProto";
option java_package = "com.eigen.api.internal.v1";

// Internal compilation service contract.
// Source of truth: RFC 0004 (CompilationService) + reference docs.

message RequestMetadata {
  string request_id = 1;
  string trace_id = 2;
  string traceparent = 3;
  string deadline = 4;
  string retry_policy = 5;
  string security_context = 6;
  string tenant_id = 7;
  string project_id = 8;
}

service CompilationService {
  rpc CompileCircuit(CompileCircuitRequest) returns (CompileCircuitResponse);
  rpc CompileJob(CompileJobRequest) returns (CompileJobResponse);
  rpc OptimizeCircuit(OptimizeCircuitRequest) returns (OptimizeCircuitResponse);
  rpc ValidateCircuit(ValidateCircuitRequest) returns (ValidateCircuitResponse);
}

message CompileCircuitRequest {
  // Source language identifier, e.g. "eigen-lang" or "qasm3".
  string language = 1;
  bytes source = 2;
  map<string, string> options = 3;
  string source_ref = 4; // QFS ref
  RequestMetadata request_metadata = 5;
}

message CompileCircuitResponse {
  CircuitPayload circuit = 1;
  map<string, string> metadata = 2;
}

message CompileJobRequest {
  string job_id = 1;
  string language = 2;
  bytes source = 3;
  string source_ref = 4; // QFS ref
  map<string, string> options = 5;
  RequestMetadata request_metadata = 6;
}

message CompileJobResponse {
  string job_id = 1;
  CircuitPayload circuit = 2;
  map<string, string> metadata = 3;
}

message OptimizeCircuitRequest {
  CircuitPayload circuit = 1;
  map<string, string> options = 2;
}

message OptimizeCircuitResponse {
  CircuitPayload circuit = 1;
  map<string, string> metrics = 2;
}

message ValidateCircuitRequest {
  string language = 1;
  bytes source = 2;
  map<string, string> options = 3;
  RequestMetadata request_metadata = 4;
}

message ValidateCircuitResponse {
  // Return OK on success, and INVALID_ARGUMENT with BadRequest details on failure.
  bool valid = 1;
}