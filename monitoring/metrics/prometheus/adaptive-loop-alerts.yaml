groups:
  - name: eigen-adaptive-loop-signals
    interval: 30s
    rules:
      - alert: EigenAdaptiveLoopRetrainQueuePressureCritical
        expr: eigen_adaptive_retrain_queue_depth > 40 and eigen_adaptive_retrain_queue_oldest_age_seconds > 900
        for: 15m
        labels: { severity: critical, team: ml-platform, owner: adaptive-loop-oncall }
        annotations:
          summary: "Adaptive retrain queue is saturated across depth and oldest-age thresholds"
          noise_suppression: "Require both queue depth and oldest-age breach for 15m to suppress burst-only noise"
          runbook: "docs/howto/adaptive-loop-observability-runbook.md#retrain-queue-pressure"

      - alert: EigenAdaptiveLoopPromotionFailuresSpike
        expr: rate(eigen_adaptive_promotion_failures_total[15m]) > 0.05 and rate(eigen_adaptive_promotion_attempts_total[15m]) > 0.2
        for: 20m
        labels: { severity: critical, team: ml-platform, owner: adaptive-loop-oncall }
        annotations:
          summary: "Candidate promotion failures sustained above deterministic failure-rate threshold"
          noise_suppression: "Gate on minimum promotion-attempt throughput before failure-rate evaluation"
          runbook: "docs/howto/adaptive-loop-observability-runbook.md#candidate-promotion-failures"

      - alert: EigenAdaptiveLoopRollbackRateHigh
        expr: rate(eigen_adaptive_rollbacks_total[30m]) / clamp_min(rate(eigen_adaptive_promotions_total[30m]), 0.001) > 0.25 and rate(eigen_adaptive_promotions_total[30m]) > 0.1
        for: 30m
        labels: { severity: warning, team: ml-platform, owner: adaptive-loop-oncall }
        annotations:
          summary: "Adaptive-loop rollback ratio exceeded safe envelope"
          noise_suppression: "Evaluate rollback ratio only when promotion traffic is non-trivial"
          runbook: "docs/howto/adaptive-loop-observability-runbook.md#rollback-rate"

      - alert: EigenAdaptiveLoopRollbackRateCritical
        expr: rate(eigen_adaptive_rollbacks_total[30m]) / clamp_min(rate(eigen_adaptive_promotions_total[30m]), 0.001) > 0.5 and rate(eigen_adaptive_promotions_total[30m]) > 0.1
        for: 20m
        labels: { severity: critical, team: ml-platform, owner: adaptive-loop-oncall }
        annotations:
          summary: "Adaptive-loop rollback ratio indicates unstable promotion safety posture"
          noise_suppression: "Critical path requires sustained breach and minimum traffic guard"
          runbook: "docs/howto/adaptive-loop-observability-runbook.md#rollback-rate"
          