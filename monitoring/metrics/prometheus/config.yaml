global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - stage-slo-alerts.yaml
  - orchestrator-alerts.yaml
  - benchmark-alerts.yaml
  - intelligent-runtime-alerts.yaml

scrape_configs:
  - job_name: eigen-kernel-stage-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:9091"]

  - job_name: eigen-orchestrator-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:9094"]

  - job_name: eigen-benchmark-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:9095"]
