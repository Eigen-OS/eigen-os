name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parser-conformance:
    name: Parser conformance (JobSpec fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system-api with dev deps
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Run parser conformance fixtures
        working-directory: src/services/system-api
        run: pytest tests/test_jobspec_parser.py

  compiler-conformance:
    name: Compiler conformance (golden + negative)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install eigen-compiler with test deps
        working-directory: src/services/eigen-compiler
        run: pip install -e . grpcio grpcio-tools grpcio-status googleapis-common-protos pytest

      - name: Run compiler conformance suite
        working-directory: src/services/eigen-compiler
        run: pytest tests/test_conformance_suite.py

  cli-conformance:
    name: CLI conformance (submit envelope + parser)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      # Fix for --locked: regenerate the lock file so it's always in sync
      - name: Regenerate Cargo.lock
        run: cargo generate-lockfile

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run CLI conformance tests
        run: cargo test -p cli --locked

      - name: Run policy plugin conformance tests
        run: |
          cargo test -p cli --locked plugin_ga_types_contract_fixtures_are_accepted
          cargo test -p cli --locked policy_manifest_requires_policy_contract_fields

  python-components:
    name: Python components install + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: system-api
            path: src/services/system-api
            install_cmd: pip install -e .[dev]
            test_cmd: pytest
          - name: driver-manager
            path: src/services/driver-manager
            install_cmd: pip install -e .[dev]
            test_cmd: pytest
          - name: eigen-compiler
            path: src/services/eigen-compiler
            install_cmd: pip install -e . grpcio grpcio-tools grpcio-status googleapis-common-protos pytest
            test_cmd: pytest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        working-directory: ${{ matrix.component.path }}
        run: ${{ matrix.component.install_cmd }}

      - name: Run component unit tests
        working-directory: ${{ matrix.component.path }}
        run: ${{ matrix.component.test_cmd }}

  
  docs-tutorial-smoke:
    name: Docs tutorial smoke checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system-api with test deps
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Run docs tutorial smoke checks
        run: bash scripts/ci/check-docs-smoke.sh
        

  green-to-green-smoke:
    name: Green-to-Green smoke (sim:local + trace/metrics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system-api with test deps
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Run E2E smoke test
        working-directory: src/services/system-api
        run: pytest tests/test_e2e_smoke_submit_watch_results.py

      - name: Run metrics smoke test
        working-directory: src/services/system-api
        run: pytest tests/test_observability_smoke.py

      - name: Run trace propagation integration test
        run: cargo test -p eigen-kernel integration_propagates_trace_id_and_traceparent_to_compiler_and_driver

      - name: Run metrics persistence integration test
        run: cargo test -p eigen-kernel integration_vqe_loop_persists_metrics_and_results_metadata

  golden-fixture-review-gate:
    name: Golden fixture review gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Detect golden fixture changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            golden:
              - 'src/services/eigen-compiler/tests/golden/**'
              - 'src/services/system-api/tests/fixtures/jobspec/**'
              - 'src/services/system-api/tests/fixtures/runtime/**'
              - 'src/rust/apps/cli/tests/fixtures/**'
              - 'src/rust/crates/resource-manager/tests/fixtures/scheduler_contracts/**'

      - name: Require maintainer approval label for fixture updates
        if: steps.filter.outputs.golden == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const requiredLabel = "golden-fixtures-approved";
            if (!labels.includes(requiredLabel)) {
              core.setFailed(
                `Golden fixtures changed. A maintainer must add the '${requiredLabel}' label to acknowledge and approve the update.`
              );
            }
  
            
  product-1-0-contract-baseline:
    name: Product 1.0 contract baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate architecture/reference links
        run: python3 scripts/ci/check-docs-links.py

      - name: Validate Product 1.0 manifest owner/test mappings
        run: python3 scripts/ci/check-product-1-0-manifest.py


  contract-drift-gate:
    name: Contract drift gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate contract artifacts manifest
        run: python3 scripts/ci/check-contract-drift.py

        
  migration-notes-gate:
    name: Migration notes gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR versioning/migration section
        run: python3 scripts/ci/check-migration-notes.py
        
  proto-contract-checks:
    name: Protobuf lint + breaking checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        working-directory: proto
        run: buf lint

      - name: Buf breaking (against main)
        working-directory: proto
        run: buf breaking --against '../.git#ref=refs/remotes/origin/main,subdir=proto'

  phase8a-ci-gate-bundle:
    name: Phase-8A CI gate bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Run Phase-8A gate bundle
        run: bash scripts/ci/check-phase8a-gates.sh
  
  phase8b-ci-gate-bundle:
    name: Phase-8B CI gate bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system-api with dev deps
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Run Phase-8B gate bundle
        run: bash scripts/ci/check-phase8b-gates.sh
  
  phase8c-ci-gate-bundle:
    name: Phase-8C CI gate bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps (benchmark-service)
        working-directory: src/services/benchmark-service
        run: pip install -e .[dev]

      - name: Run Phase-8C gate bundle
        run: bash scripts/ci/check-phase8c-gates.sh
  
  sast-gate:
    name: SAST gate (Bandit + Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SAST tools
        run: pip install bandit semgrep

      - name: Run Bandit
        run: bandit -q -r src/services -x "*/tests/*" -s B101,B104,B105,B108,B311

      - name: Run Semgrep
        run: semgrep scan --error --config p/security-audit --config p/python --config p/rust src/services/*/src

  dast-gate:
    name: DAST gate (ZAP baseline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP ZAP baseline
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "https://example.com"
          cmd_options: "-I -a"
          fail_action: false

  sbom-gate:
    name: SBOM gate (CycloneDX generation + Trivy scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json

      - name: Verify SBOM contains components
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          doc = json.loads(Path("sbom.cdx.json").read_text(encoding="utf-8"))
          components = doc.get("components", [])
          if not components:
              raise SystemExit("SBOM gate failed: no components found")
          print(f"[sbom-gate] components={len(components)}")
          PY

      - name: Scan SBOM with Trivy (HIGH/CRITICAL fail-closed)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "sbom"
          scan-ref: "sbom.cdx.json"
          format: "table"
          ignore-unfixed: true
          exit-code: "1"
          severity: "HIGH,CRITICAL"

  phase9a-ci-gate-bundle:
    name: Phase-9A CI gate bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Run Phase-9A gate bundle
        run: bash scripts/ci/check-phase9a-gates.sh
        
  phase2-contract-compatibility:
    name: Phase-2 contract compatibility suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps (system-api)
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Install Python deps (driver-manager)
        working-directory: src/services/driver-manager
        run: pip install -e .[dev]

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Run compatibility suite
        run: bash scripts/test/run-contract-compatibility-suite.sh
        