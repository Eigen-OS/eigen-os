name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parser-conformance:
    name: Parser conformance (JobSpec fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system-api with dev deps
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Run parser conformance fixtures
        working-directory: src/services/system-api
        run: pytest tests/test_jobspec_parser.py

  compiler-conformance:
    name: Compiler conformance (golden + negative)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install eigen-compiler with test deps
        working-directory: src/services/eigen-compiler
        run: pip install -e . grpcio grpcio-tools grpcio-status googleapis-common-protos pytest

      - name: Run compiler conformance suite
        working-directory: src/services/eigen-compiler
        run: pytest tests/test_conformance_suite.py

  cli-conformance:
    name: CLI conformance (submit envelope + parser)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      # Fix for --locked: regenerate the lock file so it's always in sync
      - name: Regenerate Cargo.lock
        run: cargo generate-lockfile

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Run CLI conformance tests
        run: cargo test -p cli --locked

  python-components:
    name: Python components install + tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: system-api
            path: src/services/system-api
            install_cmd: pip install -e .[dev]
            test_cmd: pytest
          - name: driver-manager
            path: src/services/driver-manager
            install_cmd: pip install -e .[dev]
            test_cmd: pytest
          - name: eigen-compiler
            path: src/services/eigen-compiler
            install_cmd: pip install -e . grpcio grpcio-tools grpcio-status googleapis-common-protos pytest
            test_cmd: pytest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        working-directory: ${{ matrix.component.path }}
        run: ${{ matrix.component.install_cmd }}

      - name: Run component unit tests
        working-directory: ${{ matrix.component.path }}
        run: ${{ matrix.component.test_cmd }}

  green-to-green-smoke:
    name: Green-to-Green smoke (sim:local + trace/metrics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rust
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system-api with test deps
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Run E2E smoke test
        working-directory: src/services/system-api
        run: pytest tests/test_e2e_smoke_submit_watch_results.py

      - name: Run metrics smoke test
        working-directory: src/services/system-api
        run: pytest tests/test_observability_smoke.py

      - name: Run trace propagation integration test
        run: cargo test -p eigen-kernel integration_propagates_trace_id_and_traceparent_to_compiler_and_driver

      - name: Run metrics persistence integration test
        run: cargo test -p eigen-kernel integration_vqe_loop_persists_metrics_and_results_metadata

  golden-fixture-review-gate:
    name: Golden fixture review gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Detect golden fixture changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            golden:
              - 'src/services/eigen-compiler/tests/golden/**'
              - 'src/services/system-api/tests/fixtures/jobspec/**'
              - 'src/services/system-api/tests/fixtures/runtime/**'
              - 'src/rust/apps/cli/tests/fixtures/**'
              - 'src/rust/crates/resource-manager/tests/fixtures/scheduler_contracts/**'

      - name: Require maintainer approval label for fixture updates
        if: steps.filter.outputs.golden == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const requiredLabel = "golden-fixtures-approved";
            if (!labels.includes(requiredLabel)) {
              core.setFailed(
                `Golden fixtures changed. A maintainer must add the '${requiredLabel}' label to acknowledge and approve the update.`
              );
            }
  

  migration-notes-gate:
    name: Migration notes gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR versioning/migration section
        run: python3 scripts/ci/check-migration-notes.py
        
  proto-contract-checks:
    name: Protobuf lint + breaking checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf lint
        working-directory: proto
        run: buf lint

      - name: Buf breaking (against main)
        working-directory: proto
        run: buf breaking --against '../.git#ref=refs/remotes/origin/main,subdir=proto'

  phase2-contract-compatibility:
    name: Phase-2 contract compatibility suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps (system-api)
        working-directory: src/services/system-api
        run: pip install -e .[dev]

      - name: Install Python deps (driver-manager)
        working-directory: src/services/driver-manager
        run: pip install -e .[dev]

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust

      - name: Run compatibility suite
        run: bash scripts/test/run-contract-compatibility-suite.sh
        