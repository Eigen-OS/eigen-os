apiVersion: eigen.os/v1
kind: QuantumJob
metadata:
  name: distributedjob
spec:
  target: cluster:auto
  program:
    source: |
      @hybrid_program
      def main():
          return 1
  workload:
    kind: DistributedJob
    topology:
      cluster_id: cluster:auto
      partition_count: 2
      partition_ids:
        - partition-0
        - partition-1
      preferred_workers:
        - worker-a
        - worker-b
        